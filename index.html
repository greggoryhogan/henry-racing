<html>
	<head>
		<title>Home | Henry Racing Team</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Yellowtail&display=swap" rel="stylesheet">
		<style type="text/css">
			body {background:#000;padding:0;margin:0}
			.wrap {  position: relative;width: 1240px;
  max-width: 98%;
  margin: 0 auto;
  display: flex;
  height: 100%;
  justify-content: center;
  align-items: center;
  color: #fff;
  flex-direction: column;
}
a {
	color: #fff;
}
a:hover {
	color: #77b2e8;
}
h1 {margin:0; font-size: 10vw; margin: 0}
p {
    font-size: 1.2rem;
    line-height: 2rem;
  font-family: "Source Sans 3", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}
.racing-sans-one-regular {
  font-family: "Racing Sans One", sans-serif;
  font-weight: 400;
  font-style: normal;
}
.yellowtail-regular {
  font-family: "Yellowtail", cursive;
  font-weight: 400;
  font-style: normal;
}
.bebas-neue-regular {
  font-family: "Bebas Neue", sans-serif;
  font-weight: 400;
  font-style: normal;
}
.checkered {
  background: repeating-conic-gradient(#000000 0 25%, #fff 0 50%) 50% / 8rem 8rem;
position: absolute;
width: 100%;
height: 100vh;
bottom: 0;
}
.checkered:after {
    content: '';
    background: linear-gradient(to bottom,
  rgba(0, 0, 0, 1) 5%,
  rgba(0, 0, 0, 0.5) 50%,
  rgba(0, 0, 0, 1) 95%);
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
}
.coming-soon {
    color: #fc9d00;
    font-size: 16vw;
  line-height: 10vw;
  margin: 0;
  transform: rotate(-10deg);
  text-align: right;
  margin-left: -5vw;
  margin-top: -5vw;
}
.coming-soon span {
    display: block;
    margin-right: -10vw;
}
			img {
				max-width: 400px;
				border-radius: 50%;
			}
			.btn {
				display: inline-block;
				margin: 10px auto 50px auto;
				padding: 10px 25px;
				color: #fff;
				background: #77b2e8;
				text-align: center;	
				text-decoration: none;
			}
			.btn:hover {
				background: #5fa4e4;
				color: #fff;
			}
			p {text-align: center;}
@media (max-width: 768px) {
    h1 {
        font-size: 15vw;
    }
}
		</style>
	</head>
	<body>
        <div class="checkered"></div>
		<div class="wrap">
			<h1 class="bebas-neue-regular">Henry Racing Team</h1>
			<p class="coming-soon yellowtail-regular">Coming <span>soon!</span></p>
		</div>
        
	</body>
</html>
