<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >
  <title>Home | Henry Racing Team</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Yellowtail&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
    }

    a {
      color: #fff;
    }

    a:hover {
      color: #77b2e8;
    }

    p {
      margin: 0;
      font-family: "Source Sans 3", sans-serif;
      font-size: 1.2rem;
      line-height: 2rem;
      font-weight: 400;
      font-style: normal;
      text-align: center;
    }

    img {
      width: 200px;
      max-width: 20%;
      border: 10px solid #fff;
      border-radius: 50%;
    }

    .wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      max-width: 98%;
      height: 100%;
      padding: 100px 0 1rem;
      color: #fff;
    }

    .bebas-neue-regular {
      font-family: "Bebas Neue", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .yellowtail-regular {
      font-family: "Yellowtail", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .checkered {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100vh;
      background: repeating-conic-gradient(#000 0 25%, #fff 0 50%) 50% / 8.5rem 8.5rem;
    }

    .checkered::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 1) 5%,
        rgba(0, 0, 0, 0.5) 50%,
        rgba(0, 0, 0, 1) 95%
      );
    }

    .henry-racing {
      margin: 0;
      font-size: 10vw;
      line-height: 10vw;
      text-align: center;
    }

    .henry-racing span {
      display: inline-block;
      margin: 0 -0.5vw 0 -4vw;
      color: #fc9d00;
      font-size: 1.3em;
      transform: rotate(-5deg);
    }

    .racing-content {
      width: 63vw;
      max-width: 95%;
      font-family: "Bebas Neue", sans-serif;
      font-size: 3rem;
      text-align: center;
    }

    .retro-box {
      padding: 2rem;
      color: #fff;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #ff00cc;
      box-shadow:
        0 0 10px #ff00cc,
        0 0 20px #ff00cc;
    }

    @media (max-width: 768px) {
      .wrap {
        padding-top: 2rem;
        padding-bottom: 0;
      }

      .henry-racing {
        font-size: 15vw;
        line-height: 21vw;
      }

      .henry-racing span {
        display: block;
        margin: -12vw 0 -7vw;
      }

      .racing-content {
        margin-top: 1rem;
        font-size: 1.9rem;
        width: 80%;
      }

      img {
        border-width: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="checkered"></div>

  <div class="wrap">
    <img src="img/driver.webp" alt="Henry Racing driver">

    <h1 class="bebas-neue-regular henry-racing">
      Henry <span class="yellowtail-regular">Racing</span> Team
    </h1>

    <div class="racing-content retro-box">
      We compete with one goal &mdash; run up front.<br>
      Built on precision, driven by consistency, and fueled by a passion for American open-wheel racing, we take on some of the most historic tracks in the country at full speed. <br>No shortcuts. No backing off. Just racing.
    </div>
  </div>
</body>
</html>
